default-engine = "ddg"
extensions = [
    "ublock-origin",
    "darkreader",
    "proton-pass",
    "youtube-shorts-block",
    "return-youtube-dislikes",
]
bookmarks = [
    { name = "Mail", url = "https://mail.proton.me" },
    { name = "Calendar", url = "https://calendar.proton.me" },
    { name = "Spotify", url = "https://open.spotify.com" },
    { name = "GitHub", url = "https://github.com" },
    { name = "NixOS Wiki", url = "https://wiki.nixos.org/wiki/NixOS_Wiki" },
    { name = "Papago", url = "https://papago.naver.com" },
    { name = "Canvas", url = "https://utah.instructure.com" },
    { name = "Thesaurus", url = "https://www.powerthesaurus.org/" },
]

[engines]
homemanager = "https://home-manager-options.extranix.com/?query={s}&release=master"
hanjadict = "https://koreanhanja.app/{s}"
koverb = "https://koreanverb.app/?search={s}"
